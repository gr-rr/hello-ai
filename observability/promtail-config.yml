server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: backend
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        regex: "/music-ai-backend"
        action: keep
      - source_labels: ["__meta_docker_container_name"]
        target_label: container
    pipeline_stages:
      - docker: {}
      - json:
          expressions:
            level: level
            logger: logger
            msg: msg
            req_id: req_id
      - labels:
          level:
          req_id:
