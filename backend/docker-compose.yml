services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: music-ai-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      SOUNDFONT_PATH: /app/soundfonts/FluidR3_GM.sf2
      SENTRY_DSN_BACKEND: ${SENTRY_DSN_BACKEND:-${SENTRY_DSN:-}}
      SENTRY_ENV: ${SENTRY_ENV:-production}
      RELEASE: ${RELEASE:-backend@latest}
    volumes:
      - ./soundfonts:/app/soundfonts:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
