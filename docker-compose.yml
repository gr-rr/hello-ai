services:
  opencode:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        USER_ID: 501
        GROUP_ID: 501
    container_name: music-ai-opencode
    working_dir: /workspace
    stdin_open: true
    tty: true
    user: "501:501"
    volumes:
      - .:/workspace
      - opencode_node_modules:/workspace/node_modules
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOME}/.gitconfig:/home/dev/.gitconfig:ro
      # Optional: mount SSH keys for Oracle VM access
      # - ${HOME}/.ssh:/home/dev/.ssh:ro
    env_file:
      - .env.local
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY:-}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - SENTRY_ACCESS_TOKEN=${SENTRY_ACCESS_TOKEN:-}
      - SENTRY_AUTH_TOKEN=${SENTRY_AUTH_TOKEN:-}
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL:-}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
      - NEXT_PUBLIC_SENTRY_DSN=${NEXT_PUBLIC_SENTRY_DSN:-}
      - NEXT_PUBLIC_MOCK_ENABLED=${NEXT_PUBLIC_MOCK_ENABLED:-false}
      - MUSIC_BACKEND_URL=${MUSIC_BACKEND_URL:-http://backend:8000}

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        USER_ID: 501
        GROUP_ID: 501
    working_dir: /workspace
    user: "501:501"
    command: npm run dev
    ports:
      - "3000:3000"
    volumes:
      - .:/workspace
      - opencode_node_modules:/workspace/node_modules
    environment:
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL:-}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
      - NEXT_PUBLIC_SENTRY_DSN=${NEXT_PUBLIC_SENTRY_DSN:-}
      - NEXT_PUBLIC_MOCK_ENABLED=${NEXT_PUBLIC_MOCK_ENABLED:-false}
      - MUSIC_BACKEND_URL=${MUSIC_BACKEND_URL:-http://backend:8000}

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        USER_ID: 501
        GROUP_ID: 501
    container_name: music-ai-backend
    working_dir: /workspace
    user: "501:501"
    command: >
      sh -c "pip install -r /workspace/backend/requirements.txt -q &&
             uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    volumes:
      - .:/workspace
    environment:
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-}
      - MUSIC_BACKEND_URL=http://backend:8000
      - PYTHONPATH=/workspace/backend
      - SOUNDFONT_PATH=/workspace/backend/soundfonts/FluidR3_GM.sf2
      - SENTRY_DSN_BACKEND=${SENTRY_DSN_BACKEND:-${SENTRY_DSN:-}}
      - SENTRY_ENV=${SENTRY_ENV:-development}
      - RELEASE=${RELEASE:-backend@dev}
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health/ready').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

volumes:
  opencode_node_modules:
