# Pre-commit hooks for hello-ai.
# Install once:  pip install pre-commit && pre-commit install
# The backend security + contract tests run here so a bad change cannot be
# committed locally — CI enforces the same via backend/tests/.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.7
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  - repo: local
    hooks:
      - id: backend-tests
        name: backend security + contract tests
        entry: bash -c 'cd backend && python -m pytest tests/test_security.py tests/test_contract.py -q'
        language: system
        pass_filenames: false
        files: ^backend/

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=2000']
