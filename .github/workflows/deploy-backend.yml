name: Deploy Backend

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.ORACLE_VM_HOST }}
          username: ${{ secrets.ORACLE_VM_USER }}
          key: ${{ secrets.ORACLE_VM_SSH_KEY }}
          script: |
            set -euo pipefail
            cd ~/hello-ai
            if [ ! -d .git ]; then
              echo "[deploy] re-initializing git"
              git init -b main
              git remote add origin https://github.com/gr-rr/hello-ai.git || git remote set-url origin https://github.com/gr-rr/hello-ai.git
              git fetch origin main
              git reset --hard origin/main
              git branch --set-upstream-to=origin/main main
            fi
            chmod +x scripts/deploy.sh
            scripts/deploy.sh
