name: Deploy Backend

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
      - 'scripts/deploy.sh'

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.ORACLE_VM_HOST }}
          username: ${{ secrets.ORACLE_VM_USER }}
          key: ${{ secrets.ORACLE_VM_SSH_KEY }}
          script: |
            set -euo pipefail
            if [ -f ~/hello-ai/scripts/deploy.sh ]; then
              chmod +x ~/hello-ai/scripts/deploy.sh
              ~/hello-ai/scripts/deploy.sh
            else
              echo "[deploy] first boot — cloning repo"
              git clone https://github.com/gr-rr/hello-ai.git ~/hello-ai
              chmod +x ~/hello-ai/scripts/deploy.sh
              ~/hello-ai/scripts/deploy.sh
            fi
