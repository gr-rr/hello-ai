# Agent of Empires - Repository Configuration
# This file configures aoe behavior for this repository.
# See: https://github.com/agent-of-empires/agent-of-empires

[session]
default_tool = "opencode"

[worktree]
enabled = true

[hooks]
on_create = ["npm ci", "cp -n ../../hello-ai/.env.local .env.local || true"]
on_launch = ["npm ci"]

[updates]
update_check_mode = "off"
